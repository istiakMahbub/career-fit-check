<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Career Fit Check</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div id="app" style="display:flex;height:100vh;width:100%;background:#f6f4ef;font-family:'IBM Plex Sans',sans-serif;color:#1b1a17;overflow:hidden;">

  <!-- SIDEBAR -->
  <aside id="sidebar" style="width:236px;flex:none;background:#fbfaf6;border-right:1px solid #e7e3da;display:flex;flex-direction:column;padding:22px 16px;">
    <div style="display:flex;align-items:center;gap:10px;padding:4px 8px 22px;">
      <div style="width:30px;height:30px;border-radius:8px;background:#15604a;position:relative;flex:none;">
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:16px;">✓</div>
      </div>
      <div>
        <div style="font-weight:600;font-size:15px;letter-spacing:-0.2px;line-height:1;">Career Fit</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:#9a9488;letter-spacing:0.5px;margin-top:3px;">FIT&nbsp;CHECK</div>
      </div>
    </div>

    <nav id="nav" style="display:flex;flex-direction:column;gap:3px;"></nav>

    <div style="flex:1;"></div>

    <div id="profile-footer" class="profile-footer"></div>
  </aside>

  <!-- MAIN -->
  <main style="flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;">

    <!-- TOPBAR -->
    <header style="flex:none;height:66px;border-bottom:1px solid #e7e3da;background:rgba(246,244,239,0.85);backdrop-filter:blur(8px);display:flex;align-items:center;padding:0 28px;gap:16px;">
      <div style="flex:1;min-width:0;">
        <div id="top-title" style="font-size:16px;font-weight:600;letter-spacing:-0.2px;line-height:1.1;"></div>
        <div id="top-sub" style="font-size:12px;color:#7a756a;margin-top:2px;"></div>
      </div>
      <div class="topbar-sync-badge">
        <span style="width:7px;height:7px;border-radius:50%;background:#15604a;box-shadow:0 0 0 3px #e7f0ea;"></span>
        <span id="sync-label">READY</span>
      </div>
      <button class="btn-primary" id="add-btn">+ Add company</button>
    </header>

    <!-- SCROLL AREA -->
    <div id="scroll-area" style="flex:1;overflow-y:auto;overflow-x:hidden;">
      <div id="screen" style="min-height:100%;"></div>
    </div>
  </main>

</div>

<!-- ADD COMPANY OVERLAY -->
<div id="add-overlay" class="overlay-backdrop" style="display:none;">
  <div style="width:560px;max-width:100%;max-height:100%;background:#f6f4ef;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,0.3);">
    <div style="flex:none;background:#fff;border-bottom:1px solid #e7e3da;padding:18px 22px;display:flex;align-items:center;gap:12px;">
      <div style="width:34px;height:34px;border-radius:9px;background:#15604a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;flex:none;">+</div>
      <div style="flex:1;">
        <div style="font-size:15px;font-weight:600;letter-spacing:-0.2px;">Add a company</div>
        <div style="font-size:11.5px;color:#7a756a;margin-top:2px;">We scan their job posts and build the dashboard automatically</div>
      </div>
      <div class="close-btn" id="add-close">✕</div>
    </div>
    <div id="add-body" style="flex:1;overflow-y:auto;padding:22px;"></div>
  </div>
</div>

<!-- TAILOR OVERLAY -->
<div id="tailor-overlay" class="overlay-backdrop" style="display:none;">
  <div style="width:780px;max-width:100%;max-height:92vh;background:#f6f4ef;border-radius:18px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,0.3);">
    <div style="flex:none;background:#fff;border-bottom:1px solid #e7e3da;padding:16px 20px;display:flex;align-items:center;gap:12px;">
      <div id="tailor-avatar" style="flex:none;"></div>
      <div style="flex:1;min-width:0;">
        <div id="tailor-title" style="font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
        <div id="tailor-sub" style="font-size:11.5px;color:#7a756a;margin-top:2px;"></div>
      </div>
      <div id="tailor-fit" style="font-family:'IBM Plex Mono',monospace;font-size:17px;font-weight:600;flex:none;"></div>
      <div class="close-btn" id="tailor-close">✕</div>
    </div>
    <div id="tailor-body" style="flex:1;overflow-y:auto;"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
